<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>911 System | Professional Software Distribution</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Noto+Kufi+Arabic:wght@400;700&display=swap" rel="stylesheet">
    
    <script>
        (function() {
            const savedLang = localStorage.getItem('preferredLang');
            const browserLang = navigator.language || navigator.userLanguage;
            const lang = savedLang || (browserLang.startsWith('ar') ? 'ar' : 'en');
            document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
        })();
    </script>

    <style>
        :root {
            --primary: #3b82f6;
            --accent: #60a5fa;
            --bg: #020617;
            --card: #0f172a;
            --border: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', 'Noto Kufi Arabic', sans-serif; overflow-x: hidden; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        nav {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 0;
            position: sticky; top: 0; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(12px);
            z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: -1px; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a, .lang-btn {
            text-decoration: none; color: var(--text-dim); font-size: 0.9rem; font-weight: 600;
            transition: 0.3s; cursor: pointer; background: none; border: none;
        }
        .nav-links a:hover, .lang-btn:hover { color: var(--primary); }

        section { display: none; padding: 80px 0; animation: slideUp 0.5s ease forwards; }
        section.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .hero { text-align: center; margin-bottom: 60px; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 15px; font-weight: 800; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .card {
            background: var(--card); border: 1px solid var(--border); padding: 40px;
            border-radius: 30px; text-align: center; transition: 0.4s; position: relative;
        }
        .card:hover { border-color: var(--primary); transform: translateY(-10px); box-shadow: 0 20px 40px rgba(59, 130, 246, 0.1); }
        .price { font-size: 3rem; font-weight: 800; margin: 20px 0; display: block; }
        .cur-sym { font-size: 1.2rem; color: var(--primary); margin-left: 8px; }

        .modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 2000; backdrop-filter: blur(10px); overflow-y: auto;
        }
        .modal-content {
            background: var(--card); max-width: 500px; margin: 40px auto; padding: 40px;
            border-radius: 32px; border: 1px solid var(--border); position: relative;
        }
        .bank-details { background: #1e293b; padding: 25px; border-radius: 20px; margin: 20px 0; border: 1px dashed var(--primary); }
        .bank-details img { width: 100%; border-radius: 12px; margin-bottom: 15px; }
        .iban-box { background: #020617; padding: 12px; border-radius: 10px; font-family: monospace; color: #34d399; font-size: 0.9rem; word-break: break-all; cursor: pointer; }

        .btn {
            width: 100%; padding: 16px; background: var(--primary); color: white; border: none;
            border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s;
        }
        .btn:disabled { background: #334155; opacity: 0.6; cursor: not-allowed; }

        .legal-box { background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid var(--border); }
        .legal-box h2 { color: var(--primary); margin: 30px 0 15px; }
        .legal-box p { color: var(--text-dim); margin-bottom: 15px; line-height: 1.8; }

        footer { text-align: center; padding: 60px 0; color: var(--text-dim); font-size: 0.8rem; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <nav>
        <div class="logo">911 SYSTEM</div>
        <div class="nav-links">
            <a href="#home" onclick="showSection('home')" data-en="Store" data-ar="المتجر">Store</a>
            <a href="#terms" onclick="showSection('terms')" data-en="Terms" data-ar="الشروط">Terms</a>
            <a href="#privacy" onclick="showSection('privacy')" data-en="Privacy" data-ar="الخصوصية">Privacy</a>
            <a href="#refund" onclick="showSection('refund')" data-en="Refunds" data-ar="الاسترداد">Refunds</a>
            <button onclick="toggleLang()" class="lang-btn" id="langBtn">العربية</button>
        </div>
    </nav>

    <section id="home">
        <div class="hero">
            <h1 data-en="Elite Software Hub" data-ar="مركز البرمجيات المتقدم">Elite Software Hub</h1>
            <p data-en="Professional tools with manual verification for maximum security." data-ar="أدوات احترافية مع تحقق يدوي لأعلى معايير الأمان."></p>
        </div>
        <div class="grid">
            <div class="card">
                <h3 data-en="Standard Plan" data-ar="الخطة الأساسية">Standard Plan</h3>
                <span class="price">7.7 <span class="cur-sym">USD</span></span>
                <button class="btn" data-en="Get Started" data-ar="ابدأ الآن" onclick="openPayment('Standard License', 55)">Get Started</button>
            </div>
            <div class="card" style="border-color: var(--primary);">
                <h3 data-en="Professional Plan" data-ar="الخطة الاحترافية">Professional Plan</h3>
                <span class="price">13 <span class="cur-sym">USD</span></span>
                <button class="btn" data-en="Upgrade Now" data-ar="ترقية الآن" onclick="openPayment('Professional License', 150)">Upgrade Now</button>
            </div>
        </div>
    </section>

    <section id="terms">
        <div class="legal-box">
            <h2 data-en="Terms of Service" data-ar="شروط الخدمة">Terms of Service</h2>
            <p data-en="By using our services, you agree to follow our guidelines and safety protocols." data-ar="بواسطة استخدام خدماتنا، فإنك توافق على اتباع إرشاداتنا وبروتوكولات الأمان الخاصة بنا."></p>
        </div>
    </section>

    <section id="privacy">
        <div class="legal-box">
            <h2 data-en="Privacy Policy" data-ar="سياسة الخصوصية">Privacy Policy</h2>
            <p data-en="We respect your privacy. No sensitive data is collected during the purchase process." data-ar="نحن نحترم خصوصيتك. لا يتم جمع أي بيانات حساسة أثناء عملية الشراء."></p>
        </div>
    </section>

    <section id="refund">
        <div class="legal-box">
            <h2 data-en="Refund Policy" data-ar="سياسة الاسترداد">Refund Policy</h2>
            <p data-en="Refunds are processed through our Discord support team after manual review." data-ar="يتم معالجة عمليات الاسترداد من خلال فريق دعم الديسكورد بعد المراجعة اليدوية."></p>
        </div>
    </section>

    <footer><p>&copy; 2026 911 System Hub.</p></footer>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()" style="position:absolute; right:30px; top:25px; cursor:pointer; font-size:24px;">&times;</span>
        <h2 id="m-title" style="margin-bottom:10px;" data-en="Secure Checkout" data-ar="دفع آمن">Secure Checkout</h2>
        
        <div id="pay-flow">
            <p style="color:var(--primary); font-weight:700; margin-bottom:15px;" data-en="Step 1: Bank Transfer" data-ar="الخطوة 1: تحويل بنكي">Step 1: Bank Transfer</p>
            <div class="bank-details">
                <img src="https://raw.githubusercontent.com/588y/3zoz/refs/heads/main/IBAN.png" alt="Bank Info">
                <div class="iban-box" onclick="copyIBAN()">SA55 8000 0277 6080 1978 5415</div>
            </div>
            
            <button id="proc-btn" class="btn" onclick="startProcessing()" data-en="Confirm Payment" data-ar="تأكيد عملية الدفع">Confirm Payment</button>
        </div>

        <div id="success-msg" style="display: none; text-align: center;"></div>
    </div>
</div>

<script>
    function updateLanguageUI(lang) {
        const isAr = lang === 'ar';
        document.body.dir = isAr ? 'rtl' : 'ltr';
        document.documentElement.dir = isAr ? 'rtl' : 'ltr';
        const langBtn = document.getElementById('langBtn');
        if (langBtn) langBtn.innerText = isAr ? 'English' : 'العربية';
        
        document.querySelectorAll('[data-en]').forEach(el => {
            el.innerText = isAr ? el.getAttribute('data-ar') : el.getAttribute('data-en');
        });
        localStorage.setItem('preferredLang', lang);
    }

    function toggleLang() {
        const newLang = document.documentElement.dir === 'rtl' ? 'en' : 'ar';
        updateLanguageUI(newLang);
    }

    function showSection(id) {
        const sections = document.querySelectorAll('section');
        sections.forEach(s => s.classList.remove('active'));
        const target = document.getElementById(id);
        if (target) {
            target.classList.add('active');
        } else {
            document.getElementById('home').classList.add('active');
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        const initialLang = localStorage.getItem('preferredLang') || (navigator.language.startsWith('ar') ? 'ar' : 'en');
        updateLanguageUI(initialLang);
        const hash = window.location.hash.replace('#', '') || 'home';
        showSection(hash);
    });

    function copyIBAN() {
        navigator.clipboard.writeText("SA55 8000 0277 6080 1978 5415");
        alert(document.documentElement.lang === 'ar' ? "تم نسخ الآيبان!" : "IBAN Copied!");
    }

    function openPayment(name, price) {
        document.getElementById('m-title').innerText = name + " - " + price + " SAR";
        document.getElementById('paymentModal').style.display = 'block';
        document.getElementById('pay-flow').style.display = 'block';
        document.getElementById('success-msg').style.display = 'none';
    }

    function closeModal() { 
        document.getElementById('paymentModal').style.display = 'none'; 
    }

    function startProcessing() {
        const isAr = document.documentElement.lang === 'ar';
        const successMsg = document.getElementById('success-msg');

        successMsg.innerHTML = `
            <div style="font-size: 50px; margin-bottom: 15px;">🛡️</div>
            <h3 style="color: #f8fafc; margin-bottom: 15px;">
                ${isAr ? 'بانتظار التأكيد' : 'Awaiting Confirmation'}
            </h3>
            <p style="color: #94a3b8; line-height: 1.8; margin-bottom: 25px; font-size: 1rem;">
                ${isAr ? 'لأسباب أمنية يرجى فتح تكت في الديسكورد وإرسال صورة الإيصال هناك، وسيقوم فريق العمل بتسليمك المنتج فوراً.' : 'For security reasons, please open a ticket on Discord and send your receipt there. Our team will deliver your product immediately.'}
            </p>
            <a href="https://discord.gg/5-5" target="_blank" class="btn" style="background:#5865F2; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:10px;">
                <img src="https://cdn-icons-png.flaticon.com/512/5968/5968756.png" width="20" style="filter: brightness(0) invert(1);">
                ${isAr ? 'فتح تكت في الديسكورد' : 'Open Ticket on Discord'}
            </a>
        `;

        document.getElementById('pay-flow').style.display = 'none';
        successMsg.style.display = 'block';
    }

    // إغلاق النافذة عند الضغط خارجها
    window.onclick = function(event) {
        const modal = document.getElementById('paymentModal');
        if (event.target == modal) closeModal();
    }
</script>

</body>
</html>
